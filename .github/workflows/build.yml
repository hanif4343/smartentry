name: Build & Release Smart Entry APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle Wrapper
        run: |
          # Download gradle-wrapper.jar directly from gradle releases
          GRADLE_VERSION="8.4"
          JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper
          echo "Downloading gradle-wrapper.jar..."
          if curl -fsSL "$JAR_URL" -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null; then
            echo "Downloaded from GitHub"
          else
            # Fallback: download full distribution and extract jar
            echo "Fallback: downloading full distribution..."
            wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
            unzip -p /tmp/gradle.zip "gradle-${GRADLE_VERSION}/lib/gradle-wrapper-*.jar" > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
            unzip /tmp/gradle.zip -d /tmp/gradle-dist
            find /tmp/gradle-dist -name "gradle-wrapper*.jar" | head -1 | xargs -I{} cp {} gradle/wrapper/gradle-wrapper.jar
          fi
          ls -lh gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Set version info
        run: |
          VERSION_CODE=${{ github.run_number }}
          DATE=$(date +'%Y%m%d')
          VERSION_NAME="1.0.${DATE}"
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" app/build.gradle
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename APK
        run: |
          mkdir -p release-output
          cp app/build/outputs/apk/release/app-release.apk \
             release-output/SmartEntry-v${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}.apk
          echo "APK_PATH=release-output/SmartEntry-v${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}.apk" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartEntry-APK-v${{ env.VERSION_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
          name: "Smart Entry v${{ env.VERSION_NAME }} (build ${{ env.VERSION_CODE }})"
          body: |
            ## Smart Entry APK
            **Version:** ${{ env.VERSION_NAME }}
            **Build:** ${{ env.VERSION_CODE }}
            ---
            APK ডাউনলোড করে ইনস্টল করুন ✅
          files: ${{ env.APK_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
