name: Generate Keystore

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore smartentry.jks \
            -alias smartentry \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass smartentry123 \
            -keypass smartentry123 \
            -dname "CN=Smart Entry, OU=Dev, O=Hanif, L=BD, S=BD, C=BD"
          
          BASE64=$(base64 -w 0 smartentry.jks)
          echo "::notice::KEYSTORE_BASE64 = $BASE64"
          echo "::notice::KEY_ALIAS = smartentry"
          echo "::notice::KEY_PASSWORD = smartentry123"
          echo "::notice::STORE_PASSWORD = smartentry123"
          echo ""
          echo "--- Copy this as KEYSTORE_BASE64 secret ---"
          echo "$BASE64"
